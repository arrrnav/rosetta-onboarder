<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onboarding Assistant</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      height: 100vh;
      color: #0f172a;
    }

    /* Header */
    header {
      padding: 12px 16px;
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #0f172a;
    }
    header p {
      font-size: 12px;
      color: #64748b;
      margin-top: 2px;
    }

    /* Message list */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 88%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 13.5px;
      line-height: 1.55;
      word-wrap: break-word;
    }
    .msg.user {
      background: #2563eb;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .msg.bot {
      background: #fff;
      color: #0f172a;
      align-self: flex-start;
      border: 1px solid #e2e8f0;
      border-bottom-left-radius: 4px;
    }
    .msg.bot.thinking {
      color: #94a3b8;
      font-style: italic;
    }
    .msg.bot.error {
      color: #dc2626;
      background: #fef2f2;
      border-color: #fecaca;
    }

    /* Markdown rendering inside bot bubbles */
    .msg.bot h1, .msg.bot h2, .msg.bot h3 {
      font-size: 13.5px;
      font-weight: 700;
      margin: 10px 0 4px;
    }
    .msg.bot h1:first-child,
    .msg.bot h2:first-child,
    .msg.bot h3:first-child { margin-top: 0; }
    .msg.bot p  { margin: 6px 0; }
    .msg.bot p:first-child { margin-top: 0; }
    .msg.bot p:last-child  { margin-bottom: 0; }
    .msg.bot ul, .msg.bot ol {
      padding-left: 18px;
      margin: 6px 0;
    }
    .msg.bot li { margin: 2px 0; }
    .msg.bot code {
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 12px;
      font-family: 'Menlo', 'Consolas', monospace;
    }
    .msg.bot pre {
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 10px 12px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .msg.bot pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 12px;
    }
    .msg.bot hr {
      border: none;
      border-top: 1px solid #e2e8f0;
      margin: 8px 0;
    }
    .msg.bot strong { font-weight: 600; }
    .msg.bot em     { font-style: italic; }

    /* Input bar */
    form {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: #fff;
      border-top: 1px solid #e2e8f0;
      flex-shrink: 0;
    }
    input[type="text"] {
      flex: 1;
      padding: 9px 13px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 13.5px;
      outline: none;
      background: #f8fafc;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus {
      border-color: #2563eb;
      background: #fff;
    }
    button[type="submit"] {
      padding: 9px 16px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    button[type="submit"]:hover  { background: #1d4ed8; }
    button[type="submit"]:active { background: #1e40af; }
    button[type="submit"]:disabled {
      background: #93c5fd;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <header>
    <h1>Onboarding Assistant</h1>
    <p>Ask anything about your repos, setup, or team conventions.</p>
  </header>

  <div id="messages">
    <div class="msg bot">
      Hi! I can answer questions about your onboarding wiki and assigned repositories.
      What would you like to know?
    </div>
  </div>

  <form id="chat-form">
    <input
      id="question-input"
      type="text"
      placeholder="Ask a question…"
      autocomplete="off"
    />
    <button type="submit" id="send-btn">Send</button>
  </form>

  <script>
    const WIKI_ID = "{{WIKI_ID}}";
    const messagesEl = document.getElementById("messages");
    const inputEl    = document.getElementById("question-input");
    const sendBtn    = document.getElementById("send-btn");

    marked.setOptions({ breaks: true });

    function appendMsg(text, cls, asMarkdown = false) {
      const el = document.createElement("div");
      el.className = "msg " + cls;
      if (asMarkdown) {
        el.innerHTML = marked.parse(text);
      } else {
        el.textContent = text;
      }
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return el;
    }

    document.getElementById("chat-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const question = inputEl.value.trim();
      if (!question) return;

      inputEl.value = "";
      sendBtn.disabled = true;
      inputEl.disabled = true;

      appendMsg(question, "user");
      const thinking = appendMsg("Thinking…", "bot thinking");

      try {
        const res = await fetch(`/chat/${WIKI_ID}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question }),
        });

        const data = await res.json();

        if (res.ok) {
          thinking.innerHTML   = marked.parse(data.answer);
          thinking.className   = "msg bot";
        } else {
          thinking.textContent = data.detail || "Something went wrong. Please try again.";
          thinking.className   = "msg bot error";
        }
      } catch {
        thinking.textContent = "Could not reach the server. Is 'rosetta serve' running?";
        thinking.className   = "msg bot error";
      }

      sendBtn.disabled  = false;
      inputEl.disabled  = false;
      inputEl.focus();
    });

    inputEl.focus();
  </script>
</body>
</html>
